version: '3.8'

services:
  backend:
    build: ./backend
    container_name: etl-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:4000/etl_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
    restart: unless-stopped
    networks:
      - etl-network

  frontend:
    build: ./frontend
    container_name: etl-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - etl-network

networks:
  etl-network:
    driver: bridge
